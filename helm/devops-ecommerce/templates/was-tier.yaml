---
# Order Service (Tomcat/Spring Boot WAS)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.namespace }}
  labels:
    app: order-service
    tier: was
    was-type: tomcat
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: was
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.orderService.port }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: order-service
          image: {{ .Values.orderService.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.orderService.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgresql:5432/orders"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: postgres-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: postgres-password
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
            - name: JAVA_OPTS
              value: {{ .Values.orderService.javaOpts | quote }}
          resources:
            {{- toYaml .Values.orderService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.orderService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.orderService.port }}
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: {{ .Values.orderService.port }}
      targetPort: {{ .Values.orderService.port }}
  selector:
    app: order-service
---
# Product Service (Node.js/Express)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
  labels:
    app: product-service
    tier: was
    was-type: nodejs
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.productService.replicas }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
        tier: was
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.productService.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: product-service
          image: {{ .Values.productService.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.productService.port }}
          env:
            - name: MONGODB_URI
              value: "mongodb://mongodb:27017/products"
            - name: REDIS_HOST
              value: "redis"
            - name: NODE_ENV
              value: "production"
          resources:
            {{- toYaml .Values.productService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: {{ .Values.productService.port }}
      targetPort: {{ .Values.productService.port }}
  selector:
    app: product-service
---
# Cart Service (Go)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: {{ .Values.namespace }}
  labels:
    app: cart-service
    tier: was
    was-type: go
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cartService.replicas }}
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        tier: was
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.cartService.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cart-service
          image: {{ .Values.cartService.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.cartService.port }}
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: PORT
              value: "{{ .Values.cartService.port }}"
          resources:
            {{- toYaml .Values.cartService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.cartService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.cartService.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: {{ .Values.cartService.port }}
      targetPort: {{ .Values.cartService.port }}
  selector:
    app: cart-service
---
# Notification Worker (Node.js, no Service needed)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-worker
    tier: was
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notificationWorker.replicas }}
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
        tier: was
    spec:
      containers:
        - name: notification-worker
          image: {{ .Values.notificationWorker.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672"
            - name: QUEUE_NAME
              value: "order.created"
          resources:
            {{- toYaml .Values.notificationWorker.resources | nindent 12 }}
