apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  namespace: ecommerce
  labels:
    app: notification-worker
    tier: was
    was-type: nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
        tier: was
        was-type: nodejs
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification-worker
          image: notification-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: metrics
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672"
            - name: QUEUE_NAME
              value: "order.created"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
