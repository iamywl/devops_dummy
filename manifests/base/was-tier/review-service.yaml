apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: ecommerce
  labels:
    app: review-service
    tier: was
    was-type: rust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
        tier: was
        was-type: rust
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: review-service
          image: review-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: MONGODB_URI
              value: "mongodb://mongodb:27017"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: ecommerce
  labels:
    app: review-service
    tier: was
spec:
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app: review-service
