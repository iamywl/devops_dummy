apiVersion: apps/v1
kind: Deployment
metadata:
  name: any
spec:
  replicas: 2
  template:
    metadata:
      labels:
        environment: prod
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              environment: prod
