<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Pretendard','Noto Sans KR',sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1a1a2e}
      .subtitle{font-size:13px;fill:#555;font-weight:500}
      .tier-label{font-size:15px;font-weight:700;fill:#fff}
      .svc-name{font-size:11px;font-weight:600;fill:#1a1a2e}
      .svc-detail{font-size:9px;fill:#666}
      .port{font-size:9px;fill:#e74c3c;font-weight:600}
      .arrow{stroke:#94a3b8;stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}
      .arrow-data{stroke:#3b82f6;stroke-width:1.5;fill:none;marker-end:url(#arrowblue)}
      .arrow-mq{stroke:#f59e0b;stroke-width:1.5;stroke-dasharray:6,3;fill:none;marker-end:url(#arrowyellow)}
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
    <marker id="arrowblue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker>
    <marker id="arrowyellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
    <linearGradient id="webGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="wasGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="mqGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ef4444"/><stop offset="1" stop-color="#dc2626"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">MAU 1천만 E-Commerce Platform — 3-Tier Architecture</text>
  <text x="600" y="60" text-anchor="middle" class="subtitle">Apple Silicon Mac / Tart VM / K8s Multi-Cluster / 5 Languages / 3 Databases</text>

  <!-- Legend -->
  <g transform="translate(900,75)">
    <rect width="280" height="75" rx="6" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <line x1="15" y1="20" x2="45" y2="20" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="52" y="24" class="svc-detail">HTTP 요청</text>
    <line x1="15" y1="38" x2="45" y2="38" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowblue)"/>
    <text x="52" y="42" class="svc-detail">DB 연결</text>
    <line x1="15" y1="56" x2="45" y2="56" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowyellow)"/>
    <text x="52" y="60" class="svc-detail">비동기 메시지 (RabbitMQ)</text>
    <text x="165" y="24" class="port">:8080 포트</text>
  </g>

  <!-- ===== Client ===== -->
  <g transform="translate(530,85)">
    <rect width="140" height="42" rx="21" fill="#1e293b" filter="url(#shadow)"/>
    <text x="70" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Client (Browser/App)</text>
    <text x="70" y="35" text-anchor="middle" fill="#94a3b8" font-size="9">k6 부하 테스트</text>
  </g>
  <line x1="600" y1="127" x2="600" y2="155" class="arrow"/>

  <!-- ===== WEB TIER ===== -->
  <g transform="translate(60,155)">
    <rect width="1080" height="120" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
    <rect width="1080" height="30" rx="10" fill="url(#webGrad)"/>
    <rect y="15" width="1080" height="15" fill="url(#webGrad)"/>
    <text x="540" y="21" text-anchor="middle" class="tier-label">WEB TIER — 리버스 프록시 + 정적 파일 + 로드밸런서</text>

    <!-- Nginx -->
    <g transform="translate(120,45)">
      <rect width="160" height="60" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
      <text x="80" y="20" text-anchor="middle" class="svc-name">Nginx Static</text>
      <text x="80" y="35" text-anchor="middle" class="svc-detail">리버스 프록시 + SPA</text>
      <text x="80" y="50" text-anchor="middle" class="port">:80 (NodePort 30080)</text>
    </g>

    <!-- HAProxy -->
    <g transform="translate(460,45)">
      <rect width="160" height="60" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
      <text x="80" y="20" text-anchor="middle" class="svc-name">HAProxy</text>
      <text x="80" y="35" text-anchor="middle" class="svc-detail">L7 로드밸런서 + Rate Limit</text>
      <text x="80" y="50" text-anchor="middle" class="port">:8080 (NodePort 30880)</text>
    </g>

    <!-- Apache -->
    <g transform="translate(800,45)">
      <rect width="160" height="60" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
      <text x="80" y="20" text-anchor="middle" class="svc-name">Apache Legacy</text>
      <text x="80" y="35" text-anchor="middle" class="svc-detail">레거시 호환 데모</text>
      <text x="80" y="50" text-anchor="middle" class="port">:80</text>
    </g>
  </g>

  <!-- Arrows Web → WAS -->
  <line x1="300" y1="275" x2="300" y2="310" class="arrow"/>
  <line x1="600" y1="275" x2="600" y2="310" class="arrow"/>

  <!-- ===== WAS TIER ===== -->
  <g transform="translate(60,310)">
    <rect width="1080" height="200" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="1080" height="30" rx="10" fill="url(#wasGrad)"/>
    <rect y="15" width="1080" height="15" fill="url(#wasGrad)"/>
    <text x="540" y="21" text-anchor="middle" class="tier-label">WAS TIER — 5개 언어 마이크로서비스 (HPA 3→10 Pod)</text>

    <!-- Order Service -->
    <g transform="translate(20,45)">
      <rect width="150" height="72" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
      <text x="75" y="18" text-anchor="middle" class="svc-name">order-service</text>
      <text x="75" y="33" text-anchor="middle" class="svc-detail">Java 17 / Spring Boot</text>
      <text x="75" y="46" text-anchor="middle" class="svc-detail">트랜잭션 + MQ 발행</text>
      <text x="75" y="62" text-anchor="middle" class="port">:8080</text>
    </g>

    <!-- Product Service -->
    <g transform="translate(190,45)">
      <rect width="150" height="72" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
      <text x="75" y="18" text-anchor="middle" class="svc-name">product-service</text>
      <text x="75" y="33" text-anchor="middle" class="svc-detail">Node.js 20 / Express</text>
      <text x="75" y="46" text-anchor="middle" class="svc-detail">읽기 70% + 캐시</text>
      <text x="75" y="62" text-anchor="middle" class="port">:3001</text>
    </g>

    <!-- Cart Service -->
    <g transform="translate(360,45)">
      <rect width="150" height="72" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
      <text x="75" y="18" text-anchor="middle" class="svc-name">cart-service</text>
      <text x="75" y="33" text-anchor="middle" class="svc-detail">Go 1.22 / net/http</text>
      <text x="75" y="46" text-anchor="middle" class="svc-detail">Redis Hash CRUD</text>
      <text x="75" y="62" text-anchor="middle" class="port">:8081</text>
    </g>

    <!-- User Service -->
    <g transform="translate(530,45)">
      <rect width="150" height="72" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
      <text x="75" y="18" text-anchor="middle" class="svc-name">user-service</text>
      <text x="75" y="33" text-anchor="middle" class="svc-detail">Python 3.12 / FastAPI</text>
      <text x="75" y="46" text-anchor="middle" class="svc-detail">JWT 인증 + 세션</text>
      <text x="75" y="62" text-anchor="middle" class="port">:8000</text>
    </g>

    <!-- Review Service -->
    <g transform="translate(700,45)">
      <rect width="150" height="72" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
      <text x="75" y="18" text-anchor="middle" class="svc-name">review-service</text>
      <text x="75" y="33" text-anchor="middle" class="svc-detail">Rust 1.77 / Actix-web</text>
      <text x="75" y="46" text-anchor="middle" class="svc-detail">30m CPU / 32Mi 최경량</text>
      <text x="75" y="62" text-anchor="middle" class="port">:8082</text>
    </g>

    <!-- Notification Worker -->
    <g transform="translate(870,45)">
      <rect width="170" height="72" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="85" y="18" text-anchor="middle" class="svc-name">notification-worker</text>
      <text x="85" y="33" text-anchor="middle" class="svc-detail">Node.js / amqplib</text>
      <text x="85" y="46" text-anchor="middle" class="svc-detail">MQ Consumer (KEDA 1→10)</text>
      <text x="85" y="62" text-anchor="middle" class="port">:3001</text>
    </g>

    <!-- Istio banner -->
    <g transform="translate(20,130)">
      <rect width="1040" height="55" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-dasharray="4,2"/>
      <text x="520" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Istio Service Mesh (Envoy Sidecar)</text>
      <text x="260" y="38" text-anchor="middle" class="svc-detail">서킷브레이커: 연속 5xx 3회 → 30초 퇴출</text>
      <text x="600" y="38" text-anchor="middle" class="svc-detail">mTLS: Pod간 TLS 1.3 자동 암호화</text>
      <text x="900" y="38" text-anchor="middle" class="svc-detail">재시도: 3회 / 타임아웃: 3~10초</text>
    </g>
  </g>

  <!-- Arrows WAS → Data -->
  <line x1="155" y1="510" x2="155" y2="570" class="arrow-data"/>
  <line x1="340" y1="510" x2="440" y2="570" class="arrow-data"/>
  <line x1="510" y1="510" x2="700" y2="570" class="arrow-data"/>
  <line x1="670" y1="510" x2="155" y2="570" class="arrow-data"/>
  <line x1="840" y1="510" x2="440" y2="570" class="arrow-data"/>

  <!-- MQ Arrow -->
  <line x1="160" y1="427" x2="1000" y2="580" class="arrow-mq"/>
  <line x1="1020" y1="427" x2="1020" y2="570" class="arrow-mq"/>

  <!-- ===== DATA TIER ===== -->
  <g transform="translate(60,570)">
    <rect width="770" height="120" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <rect width="770" height="30" rx="10" fill="url(#dataGrad)"/>
    <rect y="15" width="770" height="15" fill="url(#dataGrad)"/>
    <text x="385" y="21" text-anchor="middle" class="tier-label">DATA TIER — Polyglot Persistence</text>

    <!-- PostgreSQL -->
    <g transform="translate(20,45)">
      <rect width="160" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
      <text x="80" y="20" text-anchor="middle" class="svc-name">PostgreSQL 16</text>
      <text x="80" y="35" text-anchor="middle" class="svc-detail">ACID 트랜잭션 (주문/유저)</text>
      <text x="80" y="50" text-anchor="middle" class="port">:5432 StatefulSet</text>
    </g>

    <!-- MongoDB -->
    <g transform="translate(300,45)">
      <rect width="160" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
      <text x="80" y="20" text-anchor="middle" class="svc-name">MongoDB 7</text>
      <text x="80" y="35" text-anchor="middle" class="svc-detail">스키마리스 (상품/리뷰)</text>
      <text x="80" y="50" text-anchor="middle" class="port">:27017 StatefulSet</text>
    </g>

    <!-- Redis -->
    <g transform="translate(580,45)">
      <rect width="160" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
      <text x="80" y="20" text-anchor="middle" class="svc-name">Redis 7</text>
      <text x="80" y="35" text-anchor="middle" class="svc-detail">캐시/세션/장바구니</text>
      <text x="80" y="50" text-anchor="middle" class="port">:6379 allkeys-lru</text>
    </g>
  </g>

  <!-- ===== MESSAGING ===== -->
  <g transform="translate(860,570)">
    <rect width="280" height="120" rx="10" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <rect width="280" height="30" rx="10" fill="url(#mqGrad)"/>
    <rect y="15" width="280" height="15" fill="url(#mqGrad)"/>
    <text x="140" y="21" text-anchor="middle" class="tier-label">MESSAGING</text>

    <g transform="translate(20,45)">
      <rect width="240" height="60" rx="8" fill="#fef2f2" stroke="#ef4444"/>
      <text x="120" y="18" text-anchor="middle" class="svc-name">RabbitMQ 3 (Topic Exchange)</text>
      <text x="120" y="35" text-anchor="middle" class="svc-detail">order.created / .shipped / .cancelled</text>
      <text x="120" y="50" text-anchor="middle" class="port">:5672 AMQP | :15672 관리UI</text>
    </g>
  </g>

  <!-- ===== PLATFORM CLUSTER (Monitoring) ===== -->
  <g transform="translate(60,720)">
    <rect width="1080" height="160" rx="10" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <rect width="1080" height="30" rx="10" fill="#10b981"/>
    <rect y="15" width="1080" height="15" fill="#10b981"/>
    <text x="540" y="21" text-anchor="middle" class="tier-label">PLATFORM CLUSTER — 모니터링 + GitOps + APM (별도 클러스터)</text>

    <g transform="translate(20,45)">
      <rect width="150" height="55" rx="8" fill="#ecfdf5" stroke="#10b981"/>
      <text x="75" y="20" text-anchor="middle" class="svc-name">Prometheus</text>
      <text x="75" y="35" text-anchor="middle" class="svc-detail">ServiceMonitor 15초 스크래핑</text>
      <text x="75" y="48" text-anchor="middle" class="port">:9090</text>
    </g>

    <g transform="translate(190,45)">
      <rect width="150" height="55" rx="8" fill="#ecfdf5" stroke="#10b981"/>
      <text x="75" y="20" text-anchor="middle" class="svc-name">Grafana</text>
      <text x="75" y="35" text-anchor="middle" class="svc-detail">대시보드 시각화</text>
      <text x="75" y="48" text-anchor="middle" class="port">:30300</text>
    </g>

    <g transform="translate(360,45)">
      <rect width="150" height="55" rx="8" fill="#ecfdf5" stroke="#10b981"/>
      <text x="75" y="20" text-anchor="middle" class="svc-name">ArgoCD</text>
      <text x="75" y="35" text-anchor="middle" class="svc-detail">GitOps App-of-Apps</text>
      <text x="75" y="48" text-anchor="middle" class="port">:30443</text>
    </g>

    <g transform="translate(530,45)">
      <rect width="150" height="55" rx="8" fill="#ecfdf5" stroke="#10b981"/>
      <text x="75" y="20" text-anchor="middle" class="svc-name">Scouter APM</text>
      <text x="75" y="35" text-anchor="middle" class="svc-detail">Java 메서드/SQL 추적</text>
      <text x="75" y="48" text-anchor="middle" class="port">:30618</text>
    </g>

    <g transform="translate(700,45)">
      <rect width="150" height="55" rx="8" fill="#ecfdf5" stroke="#10b981"/>
      <text x="75" y="20" text-anchor="middle" class="svc-name">Elasticsearch</text>
      <text x="75" y="35" text-anchor="middle" class="svc-detail">중앙 로그 저장소</text>
      <text x="75" y="48" text-anchor="middle" class="port">:9200</text>
    </g>

    <g transform="translate(870,45)">
      <rect width="170" height="55" rx="8" fill="#ecfdf5" stroke="#10b981"/>
      <text x="85" y="20" text-anchor="middle" class="svc-name">Kibana</text>
      <text x="85" y="35" text-anchor="middle" class="svc-detail">로그 검색/시각화</text>
      <text x="85" y="48" text-anchor="middle" class="port">:30561</text>
    </g>

    <!-- Fluentd note -->
    <g transform="translate(20,110)">
      <rect width="1040" height="30" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4,2"/>
      <text x="520" y="20" text-anchor="middle" class="svc-detail">Fluentd DaemonSet → 각 노드 /var/log/containers 수집 → Elasticsearch 전송 → Kibana 시각화</text>
    </g>
  </g>
</svg>
