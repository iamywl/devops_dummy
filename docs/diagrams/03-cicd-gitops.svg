<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'Pretendard','Noto Sans KR',sans-serif">
  <defs>
    <style>
      .title{font-size:20px;font-weight:700;fill:#1a1a2e}
      .svc{font-size:11px;font-weight:600;fill:#1a1a2e}
      .detail{font-size:9px;fill:#666}
      .label{font-size:10px;font-weight:600}
      .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#a1)}
      .arrow-auto{stroke:#10b981;stroke-width:2;fill:none;marker-end:url(#a2)}
      .arrow-manual{stroke:#f59e0b;stroke-width:2;stroke-dasharray:6,3;fill:none;marker-end:url(#a3)}
    </style>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="1100" height="600" fill="#f8fafc" rx="12"/>
  <text x="550" y="35" text-anchor="middle" class="title">CI/CD Pipeline — ArgoCD App-of-Apps GitOps</text>

  <!-- Legend -->
  <g transform="translate(780,48)">
    <rect width="290" height="45" rx="6" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <line x1="15" y1="15" x2="55" y2="15" stroke="#10b981" stroke-width="2" marker-end="url(#a2)"/>
    <text x="62" y="19" class="detail">자동 동기화 (Automated)</text>
    <line x1="15" y1="33" x2="55" y2="33" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a3)"/>
    <text x="62" y="37" class="detail">수동 동기화 (Manual Sync)</text>
  </g>

  <!-- ===== Step 1: Developer ===== -->
  <g transform="translate(50,80)">
    <rect width="160" height="70" rx="35" fill="#1e293b" filter="url(#sh)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Developer</text>
    <text x="80" y="48" text-anchor="middle" fill="#94a3b8" font-size="9">git push main</text>
    <text x="80" y="60" text-anchor="middle" fill="#94a3b8" font-size="9">manifests/ 변경</text>
  </g>
  <line x1="210" y1="115" x2="280" y2="115" class="arrow"/>

  <!-- ===== Step 2: GitHub ===== -->
  <g transform="translate(280,80)">
    <rect width="170" height="70" rx="10" fill="#fff" stroke="#24292f" stroke-width="2" filter="url(#sh)"/>
    <text x="85" y="22" text-anchor="middle" class="svc">GitHub Repository</text>
    <text x="85" y="38" text-anchor="middle" class="detail">devops_dummpy.git</text>
    <text x="85" y="52" text-anchor="middle" class="detail">manifests/overlays/{env}/</text>
    <text x="85" y="64" text-anchor="middle" class="detail">argocd/*.yaml</text>
  </g>
  <line x1="450" y1="115" x2="530" y2="115" class="arrow"/>
  <text x="490" y="108" text-anchor="middle" class="detail">Poll 3분</text>
  <text x="490" y="120" text-anchor="middle" class="detail">또는 Webhook</text>

  <!-- ===== Step 3: ArgoCD Root ===== -->
  <g transform="translate(530,70)">
    <rect width="220" height="90" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
    <rect width="220" height="26" rx="10" fill="#8b5cf6"/>
    <rect y="13" width="220" height="13" fill="#8b5cf6"/>
    <text x="110" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ArgoCD (Platform Cluster)</text>
    <text x="110" y="46" text-anchor="middle" class="svc">ecommerce-apps</text>
    <text x="110" y="60" text-anchor="middle" class="detail">Root Application (App-of-Apps)</text>
    <text x="110" y="74" text-anchor="middle" class="detail">path: argocd/ | selfHeal: true</text>
  </g>

  <!-- Arrows from Root → Child Apps -->
  <line x1="590" y1="160" x2="180" y2="240" class="arrow-auto"/>
  <line x1="640" y1="160" x2="530" y2="240" class="arrow-manual"/>
  <line x1="690" y1="160" x2="880" y2="240" class="arrow-manual"/>

  <!-- ===== Child App: Dev ===== -->
  <g transform="translate(60,240)">
    <rect width="240" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
    <rect width="240" height="26" rx="10" fill="#10b981"/>
    <rect y="13" width="240" height="13" fill="#10b981"/>
    <text x="120" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ecommerce-dev</text>
    <text x="120" y="46" text-anchor="middle" class="svc">DEV 환경 (자동 배포)</text>
    <text x="20" y="62" class="detail">source: manifests/overlays/dev</text>
    <text x="20" y="76" class="detail">syncPolicy: automated (prune + selfHeal)</text>
    <text x="20" y="90" class="detail">namePrefix: dev-</text>
    <text x="20" y="104" class="detail">replicas: 1 | LOG_LEVEL: debug</text>
  </g>

  <!-- ===== Child App: Staging ===== -->
  <g transform="translate(410,240)">
    <rect width="240" height="110" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#sh)"/>
    <rect width="240" height="26" rx="10" fill="#eab308"/>
    <rect y="13" width="240" height="13" fill="#eab308"/>
    <text x="120" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ecommerce-staging</text>
    <text x="120" y="46" text-anchor="middle" class="svc">STAGING 환경 (수동 승인)</text>
    <text x="20" y="62" class="detail">source: manifests/overlays/staging</text>
    <text x="20" y="76" class="detail">syncPolicy: manual (UI에서 Sync 클릭)</text>
    <text x="20" y="90" class="detail">namePrefix: staging-</text>
    <text x="20" y="104" class="detail">replicas: 2 | LOG_LEVEL: info</text>
  </g>

  <!-- ===== Child App: Prod ===== -->
  <g transform="translate(760,240)">
    <rect width="270" height="110" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
    <rect width="270" height="26" rx="10" fill="#ef4444"/>
    <rect y="13" width="270" height="13" fill="#ef4444"/>
    <text x="135" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ecommerce-prod</text>
    <text x="135" y="46" text-anchor="middle" class="svc">PROD 환경 (수동 승인)</text>
    <text x="20" y="62" class="detail">source: manifests/overlays/prod</text>
    <text x="20" y="76" class="detail">syncPolicy: manual (명시적 승인 필요)</text>
    <text x="20" y="90" class="detail">namePrefix: prod- | HPA + KEDA + PDB</text>
    <text x="20" y="104" class="detail">replicas: 3→10 | LOG_LEVEL: warn</text>
  </g>

  <!-- Arrows → Clusters -->
  <line x1="180" y1="350" x2="180" y2="400" class="arrow-auto"/>
  <line x1="530" y1="350" x2="530" y2="400" class="arrow-manual"/>
  <line x1="895" y1="350" x2="895" y2="400" class="arrow-manual"/>

  <!-- ===== Target Clusters ===== -->
  <g transform="translate(60,400)">
    <rect width="240" height="80" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
    <text x="120" y="22" text-anchor="middle" class="svc">dev-cluster</text>
    <text x="120" y="40" text-anchor="middle" class="detail">dev-master + dev-worker1</text>
    <text x="120" y="55" text-anchor="middle" class="detail">4 vCPU / 12GB RAM</text>
    <text x="120" y="70" text-anchor="middle" class="detail">Istio sidecar 활성화</text>
  </g>

  <g transform="translate(410,400)">
    <rect width="240" height="80" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
    <text x="120" y="22" text-anchor="middle" class="svc">staging-cluster</text>
    <text x="120" y="40" text-anchor="middle" class="detail">staging-master + staging-worker1</text>
    <text x="120" y="55" text-anchor="middle" class="detail">4 vCPU / 12GB RAM</text>
    <text x="120" y="70" text-anchor="middle" class="detail">topologySpread 활성화</text>
  </g>

  <g transform="translate(760,400)">
    <rect width="270" height="80" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
    <text x="135" y="22" text-anchor="middle" class="svc">prod-cluster</text>
    <text x="135" y="40" text-anchor="middle" class="detail">prod-master + prod-worker1 + prod-worker2</text>
    <text x="135" y="55" text-anchor="middle" class="detail">6 vCPU / 19GB RAM</text>
    <text x="135" y="70" text-anchor="middle" class="detail">HPA + KEDA + PDB + antiAffinity</text>
  </g>

  <!-- ===== Kustomize Build Process ===== -->
  <g transform="translate(60,510)">
    <rect width="970" height="70" rx="10" fill="#fff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#sh)"/>
    <text x="485" y="20" text-anchor="middle" class="svc">Kustomize Build Process (ArgoCD가 내부적으로 실행)</text>
    <text x="30" y="42" class="detail">1. base/ 로드: namespace, web-tier, was-tier, data-tier, messaging, logging, monitoring, ingress 총 18개 리소스</text>
    <text x="30" y="56" class="detail">2. overlay 적용: namePrefix 추가 → commonLabels 주입 → resource-patches.yaml 적용 → 환경별 config.yaml 주입</text>
    <text x="30" y="70" class="detail">3. prod만: hpa.yaml (6개 HPA) + pdb.yaml (Pod Disruption Budget) + keda-scalers.yaml (notification-worker ScaledObject) 추가 리소스 병합</text>
  </g>
</svg>
