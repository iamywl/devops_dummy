<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps E-Commerce Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e6f0;
      --text-muted: #8b8fa3;
      --accent: #6c5ce7;
      --accent-hover: #7f70f0;
      --success: #00cec9;
      --danger: #ff7675;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .brand span { color: var(--text); font-weight: 400; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }

    /* Main */
    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      gap: 2rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
    }

    /* Products */
    #products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .product-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
      transition: border-color 0.2s;
    }
    .product-card:hover { border-color: var(--accent); }

    .product-card h3 {
      font-size: 1rem;
      margin-bottom: 0.4rem;
    }

    .product-card .price {
      color: var(--success);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .product-card .stock {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .btn {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.45rem 1rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn.danger { background: var(--danger); }

    /* Cart */
    #cart-items { min-height: 40px; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    #cart-total {
      text-align: right;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 0.8rem;
      color: var(--success);
    }

    /* Orders */
    #order-status {
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      min-height: 40px;
    }

    .status-msg {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 1.2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    footer strong { color: var(--accent); }

    .empty { color: var(--text-muted); font-size: 0.85rem; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="brand">DevOps <span>E-Commerce Platform</span></div>
    <nav>
      <a href="#products-section">Products</a>
      <a href="#cart-section">Cart</a>
      <a href="#orders-section">Orders</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main>

    <!-- Products Section -->
    <section id="products-section" class="card">
      <div class="section-title">Products</div>
      <div id="products-grid">
        <p class="empty"><span class="loader"></span> Loading products...</p>
      </div>
    </section>

    <!-- Cart Section -->
    <section id="cart-section" class="card">
      <div class="section-title">Shopping Cart</div>
      <div id="cart-items">
        <p class="empty">Your cart is empty.</p>
      </div>
      <div id="cart-total"></div>
      <button class="btn" id="checkout-btn" style="display:none;" onclick="placeOrder()">Place Order</button>
    </section>

    <!-- Orders Section -->
    <section id="orders-section" class="card">
      <div class="section-title">Order Status</div>
      <div id="order-status">
        <p class="empty">No orders yet.</p>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <strong>MAU 10M Architecture Demo</strong> &mdash; Powered by Kubernetes, RabbitMQ, Redis &amp; PostgreSQL
  </footer>

  <script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    const cart = []; // { id, name, price, qty }

    // -----------------------------------------------------------------------
    // Products
    // -----------------------------------------------------------------------
    async function fetchProducts() {
      const grid = document.getElementById("products-grid");
      try {
        const res = await fetch("/api/products");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const products = Array.isArray(data) ? data : data.products || [];
        if (products.length === 0) {
          grid.innerHTML = '<p class="empty">No products available.</p>';
          return;
        }
        grid.innerHTML = products
          .map(
            (p) => `
          <div class="product-card">
            <h3>${esc(p.name)}</h3>
            <div class="price">$${Number(p.price).toFixed(2)}</div>
            <div class="stock">Stock: ${p.stock ?? "N/A"}</div>
            <button class="btn" onclick='addToCart(${JSON.stringify({ id: p.id, name: p.name, price: p.price })})'>Add to Cart</button>
          </div>`
          )
          .join("");
      } catch (err) {
        grid.innerHTML = `<p class="empty">Failed to load products: ${esc(err.message)}</p>`;
      }
    }

    // -----------------------------------------------------------------------
    // Cart
    // -----------------------------------------------------------------------
    function addToCart(product) {
      const existing = cart.find((i) => i.id === product.id);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...product, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      const idx = cart.findIndex((i) => i.id === id);
      if (idx !== -1) cart.splice(idx, 1);
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById("cart-items");
      const totalEl = document.getElementById("cart-total");
      const checkoutBtn = document.getElementById("checkout-btn");

      if (cart.length === 0) {
        container.innerHTML = '<p class="empty">Your cart is empty.</p>';
        totalEl.textContent = "";
        checkoutBtn.style.display = "none";
        return;
      }

      container.innerHTML = cart
        .map(
          (item) => `
        <div class="cart-item">
          <span>${esc(item.name)} x ${item.qty}</span>
          <span>
            $${(item.price * item.qty).toFixed(2)}
            <button class="btn danger" style="margin-left:0.5rem;padding:0.2rem 0.6rem;font-size:0.75rem;" onclick="removeFromCart('${item.id}')">Remove</button>
          </span>
        </div>`
        )
        .join("");

      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      totalEl.textContent = `Total: $${total.toFixed(2)}`;
      checkoutBtn.style.display = "inline-block";
    }

    // -----------------------------------------------------------------------
    // Orders
    // -----------------------------------------------------------------------
    async function placeOrder() {
      const statusEl = document.getElementById("order-status");
      const items = cart.map((i) => ({ productId: i.id, quantity: i.qty }));
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

      statusEl.innerHTML = '<p class="status-msg"><span class="loader"></span> Placing order...</p>' + statusEl.innerHTML;

      try {
        const res = await fetch("/api/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items, totalAmount: total }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const order = await res.json();
        statusEl.innerHTML =
          `<p class="status-msg" style="color:var(--success);">Order ${order.id || order.orderId || "submitted"} placed successfully!</p>` +
          statusEl.innerHTML.replace(/<p class="status-msg"><span class="loader"><\/span> Placing order\.\.\.<\/p>/, "");

        // Clear cart
        cart.length = 0;
        renderCart();
      } catch (err) {
        statusEl.innerHTML =
          `<p class="status-msg" style="color:var(--danger);">Order failed: ${esc(err.message)}</p>` +
          statusEl.innerHTML.replace(/<p class="status-msg"><span class="loader"><\/span> Placing order\.\.\.<\/p>/, "");
      }
    }

    async function fetchCartFromServer() {
      try {
        const res = await fetch("/api/cart");
        if (!res.ok) return;
        const data = await res.json();
        // Optionally sync server-side cart
      } catch (_) {
        // Cart service unavailable, use local cart
      }
    }

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    fetchProducts();
    fetchCartFromServer();
  </script>

</body>
</html>
