apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devops-ecommerce
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/ywlee/devops_dummpy.git
    targetRevision: HEAD
    path: manifests/overlays/dev
  destination:
    name: dev-cluster
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
